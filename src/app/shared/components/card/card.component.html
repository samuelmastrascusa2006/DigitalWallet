<div class="wallet-card nova-glass card-glow" [style.background]="getCardGradient()">
  <div class="holographic-glare" [style.background]="getHolographicGlare()"></div>
  
  <div class="card-brand-label">
    <h1 *ngIf="card.franchise.toLowerCase() !== 'unknown'">{{ card.franchise | uppercase }}</h1>
    <h1 *ngIf="card.franchise.toLowerCase() === 'unknown'">VAULT</h1>
  </div>

  <div class="card-chip-container">
    <div class="card-chip nova-glow">
      <div class="chip-pattern"></div>
    </div>
    <div class="card-number-right">
      <span class="masked">•••• •••• ••••</span>
      <span class="last-four">{{ card.cardNumber }}</span>
    </div>
  </div>

  <div class="card-data-grid">
    <div class="data-item">
      <span class="label">Tipo</span>
      <span class="value">{{ card.franchise | titlecase }}</span>
    </div>
    <div class="data-item">
      <span class="label">Vencimiento</span>
      <span class="value">{{ card.expiryDate }}</span>
    </div>
  </div>

  <div class="card-footer-info">
    <div class="data-item name-item">
      <span class="label">Nombre</span>
      <span class="value">{{ card.cardHolder | uppercase }}</span>
    </div>
    <div class="card-franchise-icon">
      <img *ngIf="card.franchise.toLowerCase() === 'visa'" src="assets/icon/visa-logo.svg" alt="Visa" class="franchise-logo">
      <img *ngIf="card.franchise.toLowerCase() === 'mastercard'" src="assets/icon/mastercard-logo.svg" alt="Mastercard" class="franchise-logo">
    </div>
  </div>
</div>
