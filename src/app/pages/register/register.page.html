<ion-content [fullscreen]="true" class="register-content">
  <div class="arched-header">
    <div class="header-overlay"></div>
    <div class="header-content anim-fade-in">
      <div class="header-top">
        <ion-back-button defaultHref="/login" class="premium-back"></ion-back-button>
        <h1 class="auth-title">Register</h1>
      </div>
      <p class="auth-subtitle">Create your account</p>
    </div>
  </div>

  <div class="auth-form-wrapper">
    <form class="main-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-row">
        <div class="input-block">
          <label>First Name</label>
          <app-custom-input
            placeholder="Ferdinand"
            formControlName="nombre"
            [showError]="controlHasError('nombre', 'required')"
            errorMessage="Req.">
          </app-custom-input>
        </div>

        <div class="input-block">
          <label>Last Name</label>
          <app-custom-input
            placeholder="Sinaga"
            formControlName="apellido"
            [showError]="controlHasError('apellido', 'required')"
            errorMessage="Req.">
          </app-custom-input>
        </div>
      </div>

      <div class="form-row">
        <div class="input-block type-pick">
          <label>Doc Type</label>
          <div class="premium-select-box">
             <ion-select formControlName="tipoDocumento" interface="popover" toggleIcon="chevron-down-outline">
                <ion-select-option *ngFor="let type of documentTypes" [value]="type">{{ type }}</ion-select-option>
             </ion-select>
          </div>
        </div>

        <div class="input-block">
          <label>Doc Number</label>
          <app-custom-input
            placeholder="12345678"
            formControlName="numeroDocumento"
            [showError]="controlHasError('numeroDocumento', 'required')"
            errorMessage="Req.">
          </app-custom-input>
        </div>
      </div>

      <div class="input-block">
        <label>Country</label>
        <div class="premium-select-box full">
           <ion-select formControlName="pais" interface="popover" toggleIcon="chevron-down-outline">
              <ion-select-option *ngFor="let country of countries" [value]="country">{{ country }}</ion-select-option>
           </ion-select>
        </div>
      </div>

      <div class="input-block">
        <label>Email</label>
        <app-custom-input
          placeholder="ferdinand@gmail.com"
          type="email"
          formControlName="email"
          [showError]="controlHasError('email', 'required') || controlHasError('email', 'email')"
          errorMessage="Invalid email">
        </app-custom-input>
      </div>

      <div class="input-block">
        <label>Password</label>
        <app-custom-input
          placeholder="••••••••"
          type="password"
          formControlName="password"
          [showError]="controlHasError('password', 'required') || controlHasError('password', 'minlength')"
          errorMessage="Min. 6 chars">
        </app-custom-input>
      </div>

      <ion-button
        expand="block"
        type="submit"
        class="login-btn-premium"
        [disabled]="submitting">
        REGISTER
      </ion-button>

      <div class="auth-footer">
        <p>I have an account? <span class="action-link" (click)="goToLogin()">Log in</span></p>
      </div>
    </form>
  </div>
</ion-content>
