<ion-header class="ion-no-border nova-glass">
  <ion-toolbar color="transparent">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Nueva Tarjeta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="add-card-content ion-padding">
  <div class="add-card-container">
    <div class="preview-header">
      <p class="section-tag">VISTA PREVIA</p>
    </div>
    
    <div class="preview-wrapper anim-fade-in" #cardPreview>
      <app-card [card]="previewCard"></app-card>
    </div>

    <form class="card-form nova-glow" [formGroup]="form" (ngSubmit)="saveCard()">
      <div class="form-header">
        <h3>Datos de la Tarjeta</h3>
        <p>Completa la información del nuevo Vault</p>
      </div>

      <app-custom-input
        label="Número de tarjeta"
        placeholder="1234 5678 9012 3456"
        icon="card-outline"
        formControlName="cardNumber"
        [showError]="controlHasError('cardNumber', 'required') || controlHasError('cardNumber', 'minlength') || luhnErrorVisible"
        [errorMessage]="controlHasError('cardNumber', 'required') ? 'Requerido' : controlHasError('cardNumber', 'minlength') ? 'Faltan dígitos' : 'Número inválido'">
      </app-custom-input>

      <app-custom-input
        label="Titular"
        placeholder="Nombre completo"
        icon="person-outline"
        formControlName="cardHolder"
        [showError]="controlHasError('cardHolder', 'required')"
        errorMessage="El titular es obligatorio">
      </app-custom-input>

      <div class="form-row">
        <app-custom-input
          label="Expiración"
          placeholder="MM/YY"
          icon="calendar-outline"
          formControlName="expiryDate"
          [showError]="controlHasError('expiryDate', 'required') || controlHasError('expiryDate', 'pattern')"
          errorMessage="Formato MM/YY">
        </app-custom-input>

        <app-custom-input
          label="CVV"
          placeholder="123"
          icon="lock-closed-outline"
          formControlName="cvv"
          [showError]="controlHasError('cvv', 'required') || controlHasError('cvv', 'pattern')"
          errorMessage="3-4 dígitos">
        </app-custom-input>
      </div>

      <div class="franchise-display nova-glass" *ngIf="detectedFranchise !== 'unknown'">
        <span class="label">Franquicia</span>
        <div class="franchise-pill anim-pop">
          <img [src]="'assets/icon/' + detectedFranchise + '-logo.svg'" [alt]="detectedFranchise">
          <span class="name">{{ detectedFranchise | uppercase }}</span>
        </div>
      </div>

      <div class="color-picker-box">
        <label>Acento de tarjeta</label>
        <div class="color-row">
          <div class="color-preview" [style.background]="form.get('color')?.value"></div>
          <input type="color" formControlName="color" class="hidden-picker" id="cardColorInput" />
          <label for="cardColorInput" class="color-select-btn">Cambiar color</label>
        </div>
      </div>

      <ion-button expand="block" type="submit" [disabled]="form.invalid || submitted" class="submit-btn nova-glow">
        Personalizar y Guardar
      </ion-button>
    </form>
  </div>
</ion-content>
