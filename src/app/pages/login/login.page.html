<ion-content [fullscreen]="true" class="login-content">
  <div class="arched-header">
    <div class="header-overlay"></div>
    <div class="header-content anim-fade-in">
      <h1 class="auth-title">Sign in to your<br>Account</h1>
      <p class="auth-subtitle">Sign in to your Account</p>
    </div>
  </div>

  <div class="auth-form-wrapper">
    <form class="main-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="input-block">
        <label>Email</label>
        <app-custom-input
          placeholder="ferdinand@gmail.com"
          type="email"
          formControlName="email"
          [showError]="controlHasError('email', 'required') || controlHasError('email', 'email')"
          errorMessage="Required">
        </app-custom-input>
      </div>

      <div class="input-block">
        <label>Password</label>
        <app-custom-input
          placeholder="••••••••"
          type="password"
          formControlName="password"
          [showError]="controlHasError('password', 'required') || controlHasError('password', 'minlength')"
          errorMessage="Required">
        </app-custom-input>
        <div class="forgot-link">
          <button type="button">Forgot Password?</button>
        </div>
      </div>

      <ion-button
        expand="block"
        type="submit"
        class="login-btn-premium"
        [disabled]="submitting">
        LOGIN
      </ion-button>

      <div class="divider">
        <span>Or login with</span>
      </div>

      <ion-button
        expand="block"
        fill="clear"
        class="google-btn-premium"
        (click)="loginWithGoogle()">
        <img src="assets/icon/google-logo.svg" alt="Google" class="social-icon" onerror="this.src='https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png'">
        GOOGLE
      </ion-button>

      <div class="auth-footer">
        <p>Don't have an account? <span class="action-link" (click)="goToRegister()">Register</span></p>
      </div>

      <div class="biometric-trigger" *ngIf="biometricQuickAccess" (click)="loginWithBiometric()">
        <ion-icon name="finger-print-outline"></ion-icon>
        <span>BIOMETRIC SIGN IN</span>
      </div>
    </form>
  </div>
</ion-content>
